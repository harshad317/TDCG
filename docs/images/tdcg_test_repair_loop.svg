<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">TDCG test-repair loop</title>
  <desc id="desc">A benchmark flow showing prompt and starter code entering a coding model, producing a solution, running public or self tests, sending visible feedback back for repair, and finally scoring hidden tests outside the model-visible sandbox.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .accent { fill: #eff6ff; stroke: #60a5fa; }
      .score { fill: #ecfdf5; stroke: #34d399; }
      .warn { fill: #fff7ed; stroke: #fb923c; }
      .title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .line { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #f97316; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="360"/>
  <text class="title" x="40" y="46">Test Driven Code Generation benchmark loop</text>

  <rect class="box" x="42" y="92" width="180" height="120" rx="12"/>
  <text class="label" x="70" y="128">Task inputs</text>
  <text class="body" x="70" y="158">prompt.md</text>
  <text class="body" x="70" y="180">starter solution.py</text>

  <rect class="box accent" x="282" y="92" width="190" height="120" rx="12"/>
  <text class="label" x="318" y="128">Code model</text>
  <text class="body" x="318" y="158">writes or repairs</text>
  <text class="body" x="318" y="180">solution.py</text>

  <rect class="box" x="532" y="92" width="190" height="120" rx="12"/>
  <text class="label" x="568" y="128">Visible tests</text>
  <text class="body" x="568" y="158">public_tests.py</text>
  <text class="body" x="568" y="180">or self_tests.py</text>

  <rect class="box warn" x="782" y="92" width="190" height="120" rx="12"/>
  <text class="label" x="812" y="128">Feedback</text>
  <text class="body" x="812" y="158">pytest output</text>
  <text class="body" x="812" y="180">sent back to model</text>

  <rect class="box score" x="782" y="250" width="190" height="72" rx="12"/>
  <text class="label" x="810" y="282">Hidden scorer</text>
  <text class="small" x="810" y="306">never visible to the model</text>

  <path class="line" d="M 222 152 H 278"/>
  <path class="line" d="M 472 152 H 528"/>
  <path class="line" d="M 722 152 H 778"/>
  <path class="loop" d="M 877 92 C 877 38, 377 38, 377 88"/>
  <path class="line" d="M 627 212 C 627 286, 708 286, 778 286"/>

  <text class="small" x="326" y="64">A: one-shot</text>
  <text class="small" x="428" y="64">C: public-test repair</text>
  <text class="small" x="602" y="64">D_val: validated self-test repair</text>
</svg>
